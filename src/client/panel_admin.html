<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CryptoAcademy - Gestió de Cursos</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="panel_admin.css">
</head>
<body>
   
  <aside class="sidebar">
    <div class="logo">
      <a href="/principal" class="logo-text">
        <img src="./assets/logo.webp" alt="Logo">
      </a>  
    </div>
    <ul class="menu">
      <li data-db-id="admin_menuAcademia" class="active"><i class="fas fa-graduation-cap"></i> <span>Academia</span></li>
    </ul>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <h1 data-db-id="admin_headerTitol">Gestió de Cursos</h1>
        <p data-db-id="admin_headerDesc">Afegeix, edita o elimina els cursos de la teva plataforma.</p>
      </div>
      <div class="admin-box">
        <div class="avatar"></div>
        <span data-db-id="admin_userName"><strong>Alex Smith</strong></span>
      
        <div class="top-right-nav">
          <div class="lang-selector">
            <i class='bx bx-globe'></i>
            <select id="languagePicker">
              <option value="cat" selected>Català</option>
              <option value="esp">Castellano</option>
              <option value="eng">English</option>
            </select>
          </div>
        </div>
        
      </div>
    </header>

    <div class="content-single">
      <div class="panel">
        <div class="panel-header">
          <h2 data-db-id="admin_panelTitol">Llista de Cursos Actius</h2>
          <button data-db-id="admin_btnAddCourse" class="btn btn-add" onclick="openModal('add')">
            <i class="fas fa-plus"></i> Afegir Nou Curs
          </button>
        </div>
        <table id="coursesTable">
          <thead>
            <tr>
              <th data-db-id="admin_tableNom">Nom del Curs</th>
              <th data-db-id="admin_tableCategoria">Categoría</th>
              <th data-db-id="admin_tablePreu">Preu</th>
              <th data-db-id="admin_tableEstat">Estat</th>
              <th data-db-id="admin_tableAccions" style="text-align: center;">Accions</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td data-db-id="admin_courseNameExample"><strong>Blockchain Pro</strong></td>
              <td data-db-id="admin_categoryTech">Tecnología</td>
              <td>€199.00</td>
              <td data-db-id="admin_statusActive"><span class="status-pill done">Acti</span></td>
              <td class="actions-cell">
                <button class="btn-action edit" onclick="openModal('edit', this)"><i class="fas fa-edit"></i></button>
                <button class="btn-action delete" onclick="deleteCourse(this)"><i class="fas fa-trash"></i></button>
              </td>
            </tr>
            </tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="courseModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 data-db-id="admin_modalAddTitle" id="modalTitle">Afegir Curs</h2>
        <span class="close" onclick="closeModal()">&times;</span>
      </div>
      <form id="courseForm">
        <input type="hidden" id="editIndex">
        <div class="form-group">
          <label data-db-id="admin_labelCourseName">Nom del Curs</label>
          <input type="text" id="courseName" placeholder="Ej. Bitcoin Avanzado" required>
        </div>
        <div class="form-group">
          <label data-db-id="admin_labelCategory">Categoría</label>
          <select id="courseCategory">
            <option data-db-id="admin_categoryTech" value="Tecnología">Tecnología</option>
            <option data-db-id="admin_categoryFinance" value="Finanzas">Finances</option>
            <option data-db-id="admin_categoryDev" value="Desarrollo">Desenvolupament</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label data-db-id="admin_labelPrice">Preu (€)</label>
            <input type="number" id="coursePrice" placeholder="199" required>
          </div>
          <div class="form-group">
            <label data-db-id="admin_labelStatus">Estado</label>
            <select id="courseStatus">
              <option data-db-id="admin_statusActive" value="Activo">Actiu</option>
              <option data-db-id="admin_statusDraft" value="Borrador">Esborany</option>
            </select>
          </div>
        </div>
        <button data-db-id="admin_btnSave" type="submit" class="btn btn-save">Guardar Canvis</button>
      </form>
    </div>
  </div>

  <script>
    const modal = document.getElementById("courseModal");
    let currentRow = null;

    function openModal(mode, btn = null) {
      modal.style.display = "flex";
      if (mode === 'edit') {
        document.getElementById("modalTitle").innerText = "Editar Curso";
        currentRow = btn.closest("tr");
        document.getElementById("courseName").value = currentRow.cells[0].innerText;
        document.getElementById("courseCategory").value = currentRow.cells[1].innerText;
        document.getElementById("coursePrice").value = currentRow.cells[2].innerText.replace('€', '');
      } else {
        document.getElementById("modalTitle").innerText = "Añadir Nuevo Curso";
        document.getElementById("courseForm").reset();
        currentRow = null;
      }
    }

    function closeModal() { modal.style.display = "none"; }

    function deleteCourse(btn) {
      if(confirm("¿Estás seguro de que deseas eliminar este curso?")) {
        btn.closest("tr").remove();
      }
    }

    document.getElementById("courseForm").onsubmit = function(e) {
      e.preventDefault();
      const name = document.getElementById("courseName").value;
      const cat = document.getElementById("courseCategory").value;
      const price = document.getElementById("coursePrice").value;
      const status = document.getElementById("courseStatus").value;
      const statusClass = status === 'Activo' ? 'done' : 'doing';

      if (currentRow) {
        // Editar fila existente
        currentRow.cells[0].innerHTML = `<strong>${name}</strong>`;
        currentRow.cells[1].innerText = cat;
        currentRow.cells[2].innerText = `€${price}`;
        currentRow.cells[3].innerHTML = `<span class="status-pill ${statusClass}">${status}</span>`;
      } else {
        // Añadir nueva fila
        const table = document.getElementById("coursesTable").getElementsByTagName('tbody')[0];
        const newRow = table.insertRow();
        newRow.innerHTML = `
          <td><strong>${name}</strong></td>
          <td>${cat}</td>
          <td>€${price}</td>
          <td><span class="status-pill ${statusClass}">${status}</span></td>
          <td class="actions-cell">
            <button class="btn-action edit" onclick="openModal('edit', this)"><i class="fas fa-edit"></i></button>
            <button class="btn-action delete" onclick="deleteCourse(this)"><i class="fas fa-trash"></i></button>
          </td>`;
      }
      closeModal();
    };

    window.onclick = function(event) { if (event.target == modal) closeModal(); }
  </script>
  <script src="./global_translations.ts"></script>
</body>
</html>
