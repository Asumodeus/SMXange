<!DOCTYPE html>
<html lang="es">
 
  <head>
    <meta charset="utf-8">
    <title data-db-id="login_titolPage">SMXCHANGE</title>
    <link rel="stylesheet" href="styles_login.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  </head>
 
  <body>
    <script src="./index.ts"></script>

    <div class="top-right-nav">
        <div class="lang-selector">
            <i class='bx bx-globe'></i>
            <select id="languagePicker">
                <option value="ca" selected>Català</option>
                <option value="es">Castellano</option>
                <option value="en">English</option>
            </select>
        </div>
    </div>
    
    <div class="wrapper">
      <header>
        <h1 data-db-id="login_titolHeader">Inici de sessió</h1>
      </header>
      <form id="login">
        <div class="input-box">
          <label for="uName"></label>
          <input type="text" id="uName" placeholder="Usuari" name="uName" required>
          <i class='bx bxs-user'></i>
        </div>
 
        <div class="input-box">
          <label for="uPassword"></label>
          <input type="password" id="uPassword" placeholder="Contrasenya" name="uPassword" autocomplete="new-password">
          <i class='bx bxs-lock-alt'></i>
          <p id="login_msgSpot"></p>
        </div>
 
        <div class="remember-forgot">
          <a data-db-id="login_linkForgot" href="/forgotPswd">Has oblidat la teva contrasenya?</a>
        </div>
 
        <button data-db-id="login_btnSubmit" type="submit" class="button">Iniciar Sessió</button>
 
        <div class="register-link">
          <p data-db-id="login_noAccount">No tens un compte? <a id="login_linkRegister" href="/register">Registra't</a></p>
        </div>
     </form>
    </div>
    <footer></footer>
  <script src="./global_translations.ts"></script>
  </body>
</html>
