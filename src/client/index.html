<!DOCTYPE html>
<html lang="es">

  <head>
    <meta charset="utf-8">
    <title>SMXCHANGE</title>
    <link rel="stylesheet" href="styles_login.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  </head>

  <body>
    <script src="./index.ts"></script>
    <div class="wrapper">
      <header>
        <h1>Inici de sessió</h1>
      </header>
      <form id="login">
        <div class="input-box">
          <label for="uName"></label>
          <input type="text" id="uName" placeholder="Usuari" name="uName" required>
          <i class='bx bxs-user'></i>
        </div>

        <div class="input-box">
          <label for="uPassword"></label>
          <input type="password" id="uPassword" placeholder="Contrasenya" name="uPassword" autocomplete="new-password">
          <i class='bx bxs-lock-alt'></i>
          <p id="msgSpot"></p>
        </div>

        <div class="remember-forgot">
          <a href="/forgotPswd">Has oblidat la teva contrasenya?</a>
        </div>

        <button type="submit" class="button">Iniciar Sessió</button>
        <div class="register-link">
          <p>No tens un compte? <a href="/register">Registra't</a></p>
        </div>
    </div>
    <footer></footer>
  </body>
</html>
